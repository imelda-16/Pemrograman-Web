<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; }

        .box {
            border: 1px solid #ccc;
            padding: 5px 8px; 
            width: 420px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            background-color: white;
        }

        .form-table {
            width: 100%;
            border-collapse: collapse;
        }

        .form-table td {
            padding: 3px 0; 
            vertical-align: middle;
        }

        .label-col {
            width: 80px; 
            font-size: 25px;
            font-family: 'Curier New', Courier, monospace;
        }

        input[type="text"] {
            width: 96%;
            padding: 3px;
            border: 1px solid #ccc;
        }

        .btn-container {
            display: flex;
            padding: 2px 0;
        }

        button { 
            width: 50px; 
            padding: 4px 0;
            cursor: pointer;
            background-color: #efefef;
            border: 1px solid #767676;
        }

        .select-col {
            padding-left: 5px; 
        }

        select { padding: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <table class="form-table">
        <tr>
            <td class="label-col">Data</td>
            <td><input type="text" id="in"></td>
        </tr>
        
        <tr>
            <td style="text-align: left;">
                <button onclick="add()">Add</button>
            </td>
            <td class="select-col">
                <select id="op" onchange="run()">
                    <option value="">Pilih Operasi</option>
                    <option value="display">Display</option>
                    <option value="count">Count</option>
                    <option value="sum">Sum</option>
                    <option value="average">Average</option>
                    <option value="max">Max</option>
                    <option value="min">Min</option>
                    <option value="ganjil">Ganjil</option>
                    <option value="genap">Genap</option>
                    <option value="hapus">Hapus</option>
                </select>
            </td>
        </tr>

        <tr>
            <td class="label-col">Hasil</td>
            <td><input type="text" id="out" readonly></td>
        </tr>
    </table>
</div>

<script>
    var list = [];

    function add() {
        var val = document.getElementById("in").value;
        if(val !== "" && !isNaN(val)) {
            list.push(parseInt(val));
            document.getElementById("in").value = ""; 
            document.getElementById("in").focus();
        }
    }

    function run() {
        var mode = document.getElementById("op").value;
        var display = document.getElementById("out");
        
        if (list.length === 0 && mode !== "hapus") {
            display.value = "Array Kosong!"; 
            return;
        }

        if (mode == "display") display.value = list.join(", ");
        else if (mode == "count") display.value = list.length;
        else if (mode == "sum") display.value = list.reduce((a, b) => a + b, 0);
        else if (mode == "average") display.value = (list.reduce((a, b) => a + b, 0) / list.length).toFixed(1);
        else if (mode == "max") display.value = Math.max(...list);
        else if (mode == "min") display.value = Math.min(...list);
        else if (mode == "ganjil") display.value = list.filter(n => n % 2 !== 0).join(", ");
        else if (mode == "genap") display.value = list.filter(n => n % 2 === 0).join(", ");
        else if (mode == "hapus") { 
            list = []; 
            display.value = ""; 
        }
        
        document.getElementById("op").value = ""; 
    }
</script>

</body>
</html>
