<!DOCTYPE html>
<html>
<head>
    <title>Tabel Warna</title>
</head>
<body>

    <table border="1" width="400" height="400" cellspacing="0" align="center">
        <tr>
            <td colspan="4" bgcolor="blue" align="center" height="80"><b>A</b></td>
            <td rowspan="4" bgcolor="yellow" align="center" width="80"><b>D</b></td>
        </tr>

        <tr>
            <td rowspan="4" bgcolor="yellow" align="center" width="80"><b>G</b></td>
            <td colspan="2" bgcolor="red" align="center" height="80"><b>B</b></td>
            <td rowspan="2" bgcolor="lime" align="center" width="80"><b>C</b></td>
        </tr>

        <tr>
            <td rowspan="2" bgcolor="lime" align="center" width="80"><b>F</b></td>
            <td bgcolor="black" align="center"><font color="white"><b>X</b></font></td>
        </tr>

        <tr>
            <td colspan="2" bgcolor="red" align="center" height="80"><b>E</b></td>
        </tr>

        <tr>
            <td colspan="4" bgcolor="blue" align="center" height="80"><b>H</b></td>
        </tr>
    </table>

</body>
</html>
