<!DOCTYPE html>
<html>
<head>
    <style>
        .navbar { list-style: none; padding: 0; margin: 50px; }
        .navbar > li { 
            float: left; 
            position: relative; 
            margin-right: 3px;
        }
        .navbar a {
            display: block;
            padding: 10px 30px;
            text-decoration: none;
            color: black;
            border: 2px dotted grey;
            background: white;
        }
        .navbar li:hover > a { background: black; color: white; }
        
        /* Sub Menu */
        .sub-menu {
            display: none;
            position: absolute;
            list-style: none;
            padding: 0;
            width: 100%;
        }
        .sub-menu a { border-top: none; }
        .navbar li:hover .sub-menu { display: block; }
    </style>
</head>
<body>
    <ul class="navbar">
        <li><a href="#">Home</a></li>
        <li><a href="#">News</a>
            <ul class="sub-menu">
                <li><a href="#">Sports</a></li>
                <li><a href="#">Music</a></li>
                <li><a href="#">Movie</a></li>
            </ul>
        </li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
    </ul>
</body>
</html>
