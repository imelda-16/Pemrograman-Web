<!DOCTYPE html>
<html>
<head>
    <style>
        .navbar-red {
            background-color: #AA0000;
            width: 850px;
            height: 130px; /* Tinggi disesuaikan */
            margin: 20px auto;
            padding-top: 15px; /* Jarak dari atas bingkai merah */
            overflow: hidden;
            box-sizing: border-box;
        }

        .navbar-red ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .navbar-red li {
            float: left;
            width: 170px; /* Lebar li disesuaikan */
            height: 140px; 
            
            background: url('nav_left.gif') no-repeat 30px top;
            
            color: white;
            font-family: "Times New Roman", serif;
            box-sizing: border-box;
 
            padding-left: 45px; 
        }

        .menu-content {
            margin-top: 35px; 
        }

        .number {
            display: block;
            font-size: 35px; 
            font-weight: bold;
            line-height: 1;
            margin-bottom: 5px;
        }

        .label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="navbar-red">
        <ul>
            <li>
                <div class="menu-content">
                    <span class="number">01</span>
                    <span class="label">About Shop</span>
                </div>
            </li>
            <li>
                <div class="menu-content">
                    <span class="number">02</span>
                    <span class="label">Gallery</span>
                </div>
            </li>
            <li>
                <div class="menu-content">
                    <span class="number">03</span>
                    <span class="label">Free Music</span>
                </div>
            </li>
            <li>
                <div class="menu-content">
                    <span class="number">04</span>
                    <span class="label">Artist</span>
                </div>
            </li>
            <li>
                <div class="menu-content">
                    <span class="number">05</span>
                    <span class="label">Contacts</span>
                </div>
            </li>
        </ul>
    </div>

</body>
</html>
